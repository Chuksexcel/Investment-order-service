name: Investment Order Service — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: investment-order-service

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: investment_orders_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: mypy app/
      - run: bandit -r app/ -ll
      - run: safety check --full-report
      - name: Run tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/investment_orders_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: app.settings.test
        run: pytest --cov=app --cov-report=xml --cov-fail-under=85 -v
      - uses: codecov/codecov-action@v4
        with: { file: coverage.xml }

  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - id: meta
        run: echo "tag=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Pre-deploy snapshot
        run: |
          aws rds create-db-snapshot \
            --db-instance-identifier investment-orders-staging \
            --db-snapshot-identifier "pre-deploy-staging-$(date +%Y%m%d-%H%M%S)"
      - name: Blue/green deploy
        run: |
          aws ecs update-service \
            --cluster investment-orders-staging \
            --service investment-orders \
            --force-new-deployment \
            --deployment-configuration "minimumHealthyPercent=100,maximumPercent=200"
          aws ecs wait services-stable \
            --cluster investment-orders-staging \
            --services investment-orders
      - name: Smoke tests
        run: |
          curl -f "${{ secrets.STAGING_URL }}/health/deep"
          curl -f "${{ secrets.STAGING_URL }}/health/ready"

  deploy-production:
    name: Deploy → Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production    # requires manual approval
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Pre-deploy snapshot (production)
        run: |
          SNAPSHOT_ID="pre-deploy-prod-$(date +%Y%m%d-%H%M%S)"
          aws rds create-db-snapshot \
            --db-instance-identifier investment-orders-primary \
            --db-snapshot-identifier "$SNAPSHOT_ID" \
            --tags Key=SHA,Value=${{ github.sha }}
          aws rds wait db-snapshot-completed \
            --db-snapshot-identifier "$SNAPSHOT_ID"
      - name: Canary deploy (10% → 100%)
        run: |
          aws deploy create-deployment \
            --application-name investment-orders \
            --deployment-group-name production \
            --description "Deploy ${{ github.sha }}"
      - name: Monitor canary (5 min)
        run: |
          for i in $(seq 1 10); do
            sleep 30
            ERROR_RATE=$(aws cloudwatch get-metric-statistics \
              --namespace InvestmentOrders --metric-name ErrorRate \
              --period 60 --statistics Average \
              --query 'Datapoints[0].Average' --output text)
            echo "Check $i — error rate: $ERROR_RATE"
            if (( $(echo "$ERROR_RATE > 0.005" | bc -l) )); then
              echo "Threshold exceeded — rolling back"
              exit 1
            fi
          done
      - name: Rollback on failure
        if: failure()
        run: aws deploy stop-deployment --deployment-id $DEPLOYMENT_ID --auto-rollback-enabled
      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Production deploy ${{ job.status }} — ${{ github.sha }} by ${{ github.actor }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
